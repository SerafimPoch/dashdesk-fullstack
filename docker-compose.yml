services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: final
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
