services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: final
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000/api}
    depends_on:
      - backend
    restart: unless-stopped
