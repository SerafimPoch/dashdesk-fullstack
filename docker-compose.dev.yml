services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
    command: sh -c "yarn install --frozen-lockfile && yarn start:dev"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    command: sh -c "yarn install --frozen-lockfile && yarn dev"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
